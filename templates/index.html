<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeshCore Contacts Manager</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin="">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <h1>MeshCore Contacts Manager</h1>

            <section id="drop-zone-section">
                <div id="drop-zone">
                    <p>Drop contacts JSON here</p>
                    <input type="file" id="file-input" accept=".json" hidden>
                </div>
                <div id="file-info"></div>
            </section>

            <section id="filters-section" hidden>
                <div id="type-filters" class="filter-group">
                    <label class="filter-label">Contact Types</label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="filter-repeater" checked> Repeater
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="filter-client" checked> Client
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="filter-room" checked> Room
                    </label>
                </div>

                <div id="radius-filter" class="filter-group">
                    <label class="filter-label">Radius Filter</label>
                    <input type="number" id="radius-km" placeholder="km" min="0" step="1">
                    <div id="radius-center-name">Click a contact or map to set center</div>
                    <button type="button" id="clear-center-btn" class="btn btn-small">Clear Center</button>
                </div>

                <div id="lastseen-filter" class="filter-group">
                    <label class="filter-label">Last Seen</label>
                    <input type="number" id="lastseen-days" placeholder="days" min="0" step="1">
                    <small>Remove contacts not seen in X days</small>
                </div>

                <div id="flags-filter" class="filter-group">
                    <label class="filter-label">Flags</label>
                    <select id="flags-select">
                        <option value="">All</option>
                        <option value="0">Flag = 0 only</option>
                        <option value="1">Flag = 1 only</option>
                    </select>
                </div>

                <div id="always-keep-filter" class="filter-group">
                    <label class="filter-label">Always Keep by Flag</label>
                    <small>Contacts with selected flag are protected from removal</small>
                    <div id="always-keep-options"></div>
                </div>

                <div id="unknown-filter" class="filter-group">
                    <label class="filter-label">Unknown Location Contacts</label>
                    <label class="radio-label">
                        <input type="radio" name="unknown-location" id="unknown-keep" value="keep" checked> Keep
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="unknown-location" id="unknown-remove" value="remove"> Remove
                    </label>
                </div>
            </section>

            <section id="actions-section" hidden>
                <button type="button" id="save-btn" class="btn btn-primary">Save Kept Contacts</button>
                <button type="button" id="export-btn" class="btn btn-secondary">Export Removed</button>
            </section>

        </aside>

        <main id="map-container">
            <div id="map"></div>
            <div id="stats-bar">Total: 0 | Keeping: 0 | Removing: 0</div>
        </main>
    </div>

    <div id="save-modal" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <h2>Save Contacts</h2>
            <label for="save-filename">Filename</label>
            <input type="text" id="save-filename" placeholder="contacts.json">
            <div class="modal-actions">
                <button type="button" id="modal-save-btn" class="btn btn-primary">Save</button>
                <button type="button" id="modal-cancel-btn" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
